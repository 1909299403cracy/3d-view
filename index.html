<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Glass Railing 3D Viewer</title>
  <style>
    body { margin:0; overflow:hidden; font-family:sans-serif; background:#f0f0f0; }
    #loader {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: 1.2rem;
      color: #555;
      text-align: center;
    }
    canvas { display:block; }
    #bg-selector {
      position: fixed;
      top: 10px; right: 10px;
      background: rgba(255,255,255,0.8);
      padding: 5px 10px; border-radius: 5px;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

<div id="loader">Loading 3D Model...</div>
<div id="bg-selector">
  Background: 
  <select id="bg-color">
    <option value="#f0f0f0">Light</option>
    <option value="#000000">Dark</option>
    <option value="#87ceeb">Sky Blue</option>
  </select>
</div>

<script type="module">
  import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
  import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';
  import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js';

  // 场景 & 摄像机
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
  camera.position.set(0, 1, 3);

  // 渲染器
  const renderer = new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  document.body.appendChild(renderer.domElement);

  // 光源
  const dirLight = new THREE.DirectionalLight(0xffffff, 1);
  dirLight.position.set(5,5,5);
  scene.add(dirLight);
  scene.add(new THREE.AmbientLight(0xffffff, 0.5));

  // 控制器
  const controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;

  // 模型加载
  const loader = new GLTFLoader();
  loader.load('glass_railing2.glb',
    function(gltf){
      const model = gltf.scene;
      model.scale.set(1,1,1); // 根据实际情况调整
      model.position.set(0,0,0);
      scene.add(model);
      document.getElementById('loader').style.display = 'none';
    },
    function(xhr){
      // 可显示百分比进度
      const percent = (xhr.loaded / xhr.total * 100).toFixed(0);
      document.getElementById('loader').innerText = `Loading 3D Model... ${percent}%`;
    },
    function(error){
      document.getElementById('loader').innerText = 'Failed to load model.';
      console.error(error);
    }
  );

  // 背景切换
  const bgSelector = document.getElementById('bg-color');
  bgSelector.addEventListener('change', (e) => {
    scene.background = new THREE.Color(e.target.value);
  });

  // 窗口自适应
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // 动画循环
  function animate(){
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
  }
  animate();
</script>

</body>
</html>
