<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>3D Model Viewer</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #f5f5f5;
    }
    #loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: Arial;
      color: #666;
    }
  </style>
</head>

<body>
<div id="loading">Loading 3D Model...</div>

<script type="module">
  // ✅ 正确引入 three（关键修复点）
  import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.158/build/three.module.js";

  import { OrbitControls } from "https://cdn.jsdelivr.net/npm/three@0.158/examples/jsm/controls/OrbitControls.js";

  import { GLTFLoader } from "https://cdn.jsdelivr.net/npm/three@0.158/examples/jsm/loaders/GLTFLoader.js";

  // 场景
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0xf5f5f5);

  // 相机
  const camera = new THREE.PerspectiveCamera(
    60,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
  );
  camera.position.set(2, 2, 5);

  // 渲染器
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  // 控制器（可以旋转）
  const controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;

  // 灯光
  const light1 = new THREE.HemisphereLight(0xffffff, 0x444444, 1);
  scene.add(light1);

  const light2 = new THREE.DirectionalLight(0xffffff, 1);
  light2.position.set(5, 10, 7);
  scene.add(light2);

  // 坐标辅助（可删）
  const axesHelper = new THREE.AxesHelper(1);
  scene.add(axesHelper);

  // ✅ 加载模型（你只需要改这里）
  const loader = new GLTFLoader();

  loader.load(
    "./glass_railing2.glb", // 👉 改成你的模型路径
    function (gltf) {
      const model = gltf.scene;

      // 自动居中
      const box = new THREE.Box3().setFromObject(model);
      const center = box.getCenter(new THREE.Vector3());
      model.position.sub(center);

      scene.add(model);

      document.getElementById("loading").style.display = "none";
    },
    function (xhr) {
      console.log((xhr.loaded / xhr.total) * 100 + "% loaded");
    },
    function (error) {
      console.error("加载失败:", error);
    }
  );

  // 自适应
  window.addEventListener("resize", () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // 渲染循环
  function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
  }

  animate();
</script>
</body>
</html>
